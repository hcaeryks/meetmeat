name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:latest

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:latest

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Prepare compose file
        run: |
          sed "s|__IMAGE_PREFIX__|${{ env.IMAGE_PREFIX }}|g" \
            docker-compose.prod.yml > docker-compose.deploy.yml

      - name: Deploy to VM
        env:
          SSH_KEY: ${{ secrets.GCP_SSH_KEY }}
          VM_HOST: ${{ secrets.GCP_VM_HOST }}
          VM_USER: ${{ secrets.GCP_VM_USER }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH="ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes"
          SCP="scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes"

          $SSH "$VM_USER@$VM_HOST" "mkdir -p ~/meetmeat/data ~/meetmeat"
          $SCP docker-compose.deploy.yml "$VM_USER@$VM_HOST:~/meetmeat/docker-compose.yml"

          $SSH "$VM_USER@$VM_HOST" << EOF
            set -euo pipefail

            # Ensure docker-compose v2 plugin exists (Debian/Ubuntu)
            if ! docker-compose version >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-plugin
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            cd ~/meetmeat
            docker-compose pull
            docker-compose up -d
            docker image prune -f
          EOF

  cleanup:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/delete-package-versions@v5
        with:
          package-name: meetmeat/backend
          package-type: container
          min-versions-to-keep: 1
          delete-only-untagged-versions: true

      - uses: actions/delete-package-versions@v5
        with:
          package-name: meetmeat/frontend
          package-type: container
          min-versions-to-keep: 1
          delete-only-untagged-versions: true
